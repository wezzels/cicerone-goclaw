name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v -short -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Linux AMD64
      run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o cicerone-linux-amd64 ./cmd

    - name: Build Linux ARM64
      run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o cicerone-linux-arm64 ./cmd

    - name: Build Darwin AMD64
      run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o cicerone-darwin-amd64 ./cmd

    - name: Build Darwin ARM64
      run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o cicerone-darwin-arm64 ./cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          cicerone-linux-amd64
          cicerone-linux-arm64
          cicerone-darwin-amd64
          cicerone-darwin-arm64
        retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout 5m