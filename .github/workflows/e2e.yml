name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5

    - name: Pull model
      run: |
        ollama pull gemma3:12b || ollama pull gemma:7b || true
        sleep 10

    - name: Build binary
      run: go build -o cicerone ./cmd

    - name: Run E2E tests
      run: go test -v -tags=e2e ./tests/...
      env:
        OLLAMA_HOST: http://localhost:11434

    - name: Upload test logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: |
          *.log
          *.txt