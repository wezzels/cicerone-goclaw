# Cicerone Configuration Example
# Copy to ~/.cicerone/config.yaml and customize

# Telegram bot configuration
telegram:
  # Get your bot token from @BotFather on Telegram
  bot_token: ""
  
  # List of allowed user IDs (empty = allow all)
  # Use @userinfobot to get your user ID
  allowed_users: []
    # - 123456789
    # - 987654321

# LLM configuration
llm:
  # Provider: "ollama" or "llamacpp"
  provider: ollama
  
  # API base URL
  # For Ollama: http://localhost:11434
  # For llama.cpp: http://localhost:8080
  base_url: "http://localhost:11434"
  
  # Default model to use
  model: "gemma3:12b"
  
  # Request timeout in seconds
  timeout: 60

# Gateway configuration (for future WebSocket API)
gateway:
  # Listen address for gateway
  listen: "127.0.0.1:8080"
  
  # Session database path
  session_db: "./data/sessions.db"

# Logging configuration
logging:
  # Log level: debug, info, warn, error
  level: info
  
  # Log file (optional, defaults to stdout)
  # file: "/var/log/cicerone.log"

# VM workspaces (optional)
# Configure VMs for isolated development environments
vms:
  # Development VM
  dev:
    # VM name in libvirt
    name: "wezzelos-dev"
    
    # Path to base disk image (qcow2)
    image: "/var/lib/libvirt/images/wezzelos-base.qcow2"
    
    # Memory in MB
    memory: 4096
    
    # Number of vCPUs
    vcpus: 2
    
    # Network name (libvirt network)
    network: "default"
    
    # SSH user (default: root)
    user: "root"
    
    # SSH port (default: 22)
    ssh_port: 22
    
    # Path to SSH private key
    ssh_key: "~/.cicerone/keys/dev"
    
    # Auto-start VM when needed
    auto_start: false
    
    # Create snapshot on stop
    snapshot_on_stop: false
  
  # Test VM (minimal config)
  test:
    name: "wezzelos-test"
    image: "/var/lib/libvirt/images/wezzelos-base.qcow2"
    memory: 2048
    vcpus: 1
    network: "default"

# Deploy defaults
deploy:
  # Default VM to use for workspace
  default_vm: "dev"
  
  # Default network for new VMs
  default_network: "default"
  
  # Storage pool for VM images
  storage_pool: "default"

# Security configuration
security:
  # Enable rate limiting
  rate_limit: true
  
  # Max requests per minute per user
  max_requests: 60
  
  # Block users after failed attempts
  max_failed_attempts: 5
  
  # Block duration in minutes
  block_duration: 30